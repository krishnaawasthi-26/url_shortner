<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <style>
        :root {
            color-scheme: light;
            font-family: Inter, Arial, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #f3f4f6;
            color: #111827;
        }

        .card {
            width: min(92vw, 620px);
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            padding: 2rem;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
        }

        p {
            margin-top: 0;
            color: #4b5563;
        }

        form {
            display: grid;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        input[type="url"], button {
            width: 100%;
            box-sizing: border-box;
            border-radius: 10px;
            border: 1px solid #d1d5db;
            padding: 0.8rem 0.9rem;
            font-size: 1rem;
        }

        button {
            border: none;
            background: #2563eb;
            color: #ffffff;
            font-weight: 600;
            cursor: pointer;
        }

        .result {
            margin-top: 1.25rem;
            padding: 0.9rem;
            border-radius: 10px;
            background: #eff6ff;
        }

        .result a {
            word-break: break-all;
            color: #1d4ed8;
            font-weight: 600;
        }
    </style>
</head>
<body>
<main class="card">
    <h1>Simple URL Shortener</h1>
    <p>Paste a link and get a short URL instantly.</p>

    <form method="post" action="/shorten">
        <label for="url">Long URL</label>
        <input id="url" type="url" name="url" placeholder="https://example.com/very/long/url" required>
        <button type="submit">Shorten URL</button>
    </form>

    <section class="result" th:if="${shortUrl}">
        <div>Original: <span th:text="${originalUrl}"></span></div>
        <div>Short: <a th:href="${shortUrl}" th:text="${shortUrl}"></a></div>
    </section>
</main>
</body>
</html>
